name: Alerta de despliegue

on:
  push:
    branches:
      - main

jobs:
  notificar:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar notificación a ntfy.sh
        run: |
          curl -H "Title: Nuevo Push en Main" \
               -H "Priority: default" \
               -d "Se ha realizado un nuevo push al repositorio en la rama main." \
               https://ntfy.sh/devops-personal